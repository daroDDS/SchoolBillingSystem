{% extends "base.html" %}

{% block title %}Login - School Billing{% endblock %}

{% block content %}
<div class="card login-card">
    <h2>Log in</h2>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary">Log in</button>
    </form>

    <div class="hint">
        <p><strong>Test accounts (all passwords: <code>password123</code>):</strong></p>
        <ul>
            <li><code>admin</code> &mdash; Administrator</li>
            <li><code>alice</code> &mdash; Finance Staff</li>
            <li><code>daro</code> &mdash; Student</li>
        </ul>
    </div>
</div>
{% endblock %}
